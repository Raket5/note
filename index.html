<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sheet Maker — Mahmud Sir</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header class="app-header">
  <div class="header-inner">
    <div class="header-logo">
      <div class="logo-emblem">⚓</div>
      <div class="header-text">
        <h1>Sheet Maker</h1>
        <p>Bangladesh Navy School And College, CTG</p>
      </div>
    </div>
    <div class="header-actions">
      <button class="btn btn-outline" onclick="previewSheet()">👁️ Preview</button>
      <button class="btn btn-primary" onclick="openDownloadModal()">⬇️ Download</button>
    </div>
  </div>
</header>

<div class="app-body">
  <!-- Sidebar (তোমার আগের সাইডবার রাখো) -->
  <aside class="sidebar">
    <!-- তোমার পুরনো sidebar কোড এখানে রাখো। আমি সংক্ষেপে রাখলাম -->
    <div class="sidebar-section">
      <div class="section-title">📄 Sheet Info</div>
      <label class="field-label">Sheet Title</label>
      <input type="text" id="sheetTitle" class="field-input" />
      <label class="field-label">Subject</label>
      <input type="text" id="sheetSubject" class="field-input" value="ICT" />
      <label class="field-label">Class & Section</label>
      <input type="text" id="sheetClass" class="field-input" />
      <label class="field-label">Sheet Type</label>
      <select id="sheetType" class="field-input"></select>
    </div>

    <!-- Teacher Info & Design sections রাখো -->
  </aside>

  <!-- Main Editor -->
  <main class="editor-area">
    <div class="editor-toolbar">
      <span class="toolbar-label">Content Editor (A4 Print Layout)</span>
      <div class="toolbar-btns">
        <button class="tbtn" onclick="fmt('bold')"><b>B</b></button>
        <button class="tbtn" onclick="fmt('italic')"><i>I</i></button>
        <button class="tbtn" onclick="fmt('underline')"><u>U</u></button>
        <button class="tbtn" onclick="insertDivider()">Divider</button>
        <button class="tbtn" onclick="insertMCQBlock()">MCQ</button>
        <button class="tbtn" onclick="insertBlankLines()">Answer Lines</button>
        <button class="tbtn" onclick="insertTable()">Table</button>
      </div>
    </div>

    <div id="pagesContainer" class="pages-container"></div>

    <div class="editor-hint">
      💡 টিপ: MS Word থেকে কপি করে পেস্ট করো। প্রতি পেজে কতটুকু কনটেন্ট যাচ্ছে দেখতে পাবে।
    </div>
  </main>
</div>

<!-- Modals (আগের মতো) -->
<div id="previewModal" class="modal-overlay hidden">
  <div class="modal-box preview-modal-box" onclick="event.stopImmediatePropagation()">
    <div class="modal-header-row">
      <h3>Sheet Preview</h3>
      <button class="btn btn-ghost btn-sm" onclick="closeModal('previewModal')">✕ Close</button>
    </div>
    <div id="previewContent" class="preview-wrapper"></div>
  </div>
</div>

<div id="downloadModal" class="modal-overlay hidden">
  <div class="modal-box">
    <h3>Download Sheet</h3>
    <div class="download-options">
      <button class="download-card" onclick="downloadPDF()">PDF</button>
      <button class="download-card" onclick="downloadDOCX()">Word</button>
    </div>
    <button class="btn btn-ghost" onclick="closeModal('downloadModal')">Cancel</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
